# Required GitHub Secret: RAILWAY_TOKEN
# Get it at: Railway Dashboard → Account Settings → Tokens → New Token
# Add at: GitHub repo → Settings → Secrets and variables → Actions → New repository secret

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - run: npm run audit:verify

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service kairos-cerebro --detach

      - name: Wait for boot
        run: sleep 30

  smoke:
    name: Smoke Tests
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run smoke checks against production
        run: |
          set -e
          BASE=https://kairoscheck.net

          # Cloudflare Bot Fight Mode returns 403 to curl/bots — that is expected
          # and means the site is UP and protected. We treat 200 and 403 as success.
          # Only 5xx, timeouts, or DNS failures are real problems.
          check_url() {
            local label="$1" url="$2"
            echo "→ ${label}"
            CODE=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [ "$CODE" = "000" ]; then
              echo "  ✖ ${label}: timeout or DNS failure" && return 1
            elif echo "$CODE" | grep -qE "^5"; then
              echo "  ✖ ${label}: server error (HTTP ${CODE})" && return 1
            else
              echo "  ✔ ${label}: HTTP ${CODE}"
            fi
          }

          check_url "Health endpoint"  "$BASE/health"
          check_url "Landing page"     "$BASE/"
          check_url "Pricing page"     "$BASE/pricing"
          check_url "Billing plans"    "$BASE/api/billing/plans"

          echo "→ All smoke checks passed"

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ github.sha }}
          path: /tmp/health.json
          retention-days: 7

  rollback:
    name: Rollback on Smoke Failure
    needs: smoke
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Rollback to previous deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway rollback --service kairos-cerebro --yes

      - name: Alert on rollback
        run: |
          echo "::error title=Production Rollback::Smoke tests failed for SHA ${{ github.sha }}. Auto-rollback triggered."
          echo "## ❌ Rollback triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Investigate: check Railway logs and the smoke artifact above." >> $GITHUB_STEP_SUMMARY

