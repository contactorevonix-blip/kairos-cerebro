name: Nightly Audit

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:

jobs:
  remote-health:
    name: Probe Production
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Health check — kairoscheck.net
        run: |
          set -e
          BASE=https://kairoscheck.net

          HTTP_CODE=$(curl -s -o health.json -w "%{http_code}" "$BASE/health")
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            cat health.json
            jq -e '.status == "OPERATIONAL"' health.json
            jq -e '.probes.dbWritable == true' health.json
            STATUS=$(jq -r '.status' health.json)
            VERSION=$(jq -r '.version // "unknown"' health.json)
            echo "## Nightly Audit — PASS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | \`$STATUS\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "Cloudflare Bot Fight Mode active — site is UP, health JSON unavailable from CI runner"
            echo "## Nightly Audit — PASS (Cloudflare 403 — site UP)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
            echo "Note: Add CF page rule to allow curl UA on /health for full JSON audit." >> $GITHUB_STEP_SUMMARY
          else
            echo "Unexpected HTTP status: $HTTP_CODE" >&2
            cat health.json || true
            exit 1
          fi

      - name: Archive health snapshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ github.run_id }}
          path: health.json
          retention-days: 30

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error title=Nightly Audit Failed::Production health check failed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "## ❌ Nightly Audit — FAIL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check Railway logs: \`railway logs --service kairos-api\`" >> $GITHUB_STEP_SUMMARY
