name: Onboarding Email Sequence

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily — morning in EU
  workflow_dispatch:

jobs:
  send-followups:
    name: Send 24h and 7-day onboarding emails
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger follow-up email sending
        env:
          ADMIN_TOKEN: ${{ secrets.KAIROS_ADMIN_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://kairoscheck.net/api/admin/send-followups \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"

          SENT_24=$(echo "$BODY" | grep -o '"sent_24h":[0-9]*' | grep -o '[0-9]*' || echo "0")
          SENT_7=$(echo "$BODY" | grep -o '"sent_7d":[0-9]*' | grep -o '[0-9]*' || echo "0")
          ERRORS=$(echo "$BODY" | grep -o '"errors":[0-9]*' | grep -o '[0-9]*' || echo "0")

          echo "## Onboarding Emails — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Email | Sent |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 24h follow-up | ${SENT_24} |" >> $GITHUB_STEP_SUMMARY
          echo "| 7-day follow-up | ${SENT_7} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error title=Onboarding Email Failed::HTTP $HTTP_CODE"
            exit 1
          fi
