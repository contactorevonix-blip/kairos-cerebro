name: Weekly Fraud Trend Report

on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC — start of business week
  workflow_dispatch:

jobs:
  send-trend-alerts:
    name: Send fraud trend email to all active customers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Send weekly fraud trends
        env:
          ADMIN_TOKEN: ${{ secrets.KAIROS_ADMIN_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://kairoscheck.net/api/admin/send-trends \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"

          SENT=$(echo "$BODY" | grep -o '"sent":[0-9]*' | grep -o '[0-9]*' || echo "0")

          echo "## Weekly Fraud Trends — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "Sent to: ${SENT} customers" >> $GITHUB_STEP_SUMMARY

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning title=Trend Alert::HTTP $HTTP_CODE — check RESEND_API_KEY"
          fi
