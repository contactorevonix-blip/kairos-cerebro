name: Volume Backup

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  backup:
    name: Backup .kairos-data to R2
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger backup via API
        env:
          ADMIN_TOKEN: ${{ secrets.KAIROS_ADMIN_TOKEN }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::warning::KAIROS_ADMIN_TOKEN not set in GitHub Actions secrets"
            echo "## ⚠️ Skipped — KAIROS_ADMIN_TOKEN not set" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://kairoscheck.net/api/admin/backup-now \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            --max-time 300)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          STATUS=$(echo "$BODY" | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
          SHA=$(echo "$BODY"   | jq -r '.sha         // "-"'    2>/dev/null || echo "-")
          SZ=$(echo "$BODY"    | jq -r '.size        // "-"'    2>/dev/null || echo "-")
          DEST=$(echo "$BODY"  | jq -r '.destination // "-"'    2>/dev/null || echo "-")
          TS=$(echo "$BODY"    | jq -r '.ts          // "-"'    2>/dev/null || echo "-")

          echo "## Volume Backup — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$HTTP_CODE" = "200" ] && [ "$STATUS" = "OK" ]; then
            echo "## ✅ Backup OK" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Timestamp | \`${TS}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Destination | \`${DEST}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Size (bytes) | ${SZ} |" >> $GITHUB_STEP_SUMMARY
            echo "| SHA-256 | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "$STATUS" = "NOT_CONFIGURED" ]; then
            echo "## ⚠️ Backup SKIPPED — R2 not configured in Railway env vars" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Backup FAILED — HTTP ${HTTP_CODE}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Response: \`${BODY}\`" >> $GITHUB_STEP_SUMMARY
            echo "::error title=Volume Backup Failed::HTTP ${HTTP_CODE} — check R2 credentials in Railway"
            exit 1
          fi
