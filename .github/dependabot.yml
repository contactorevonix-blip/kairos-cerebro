version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Lisbon"
    allow:
      - dependency-name: stripe
      - dependency-name: resend
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: chore
