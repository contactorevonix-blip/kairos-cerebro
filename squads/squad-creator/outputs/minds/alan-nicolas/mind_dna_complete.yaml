# ───────────────────────────────────────────────────────────────────────
# NOTA PARA PEDRO
# ───────────────────────────────────────────────────────────────────────
note_for_pedro: |
  O modelo mental do Alan Nicolas em uma frase: "Liberdade criativa sobre uma fundação
  rígida e auditável." Ele não confia em disciplina humana — codifica as regras (Constitution),
  protege o núcleo (L1-L4), distribui autoridade (agent authority), e bloqueia desvios com gates.
  Tudo o que parece 'burocracia' no AIOX (stories, gates, tiers, IDS) existe para uma coisa:
  deixar-te (o Vibe CEO) dirigir com alavancagem máxima da IA SEM perder o controlo nem a coerência.
  Quando o AIOX te 'obriga' a uma story antes de código, ou bloqueia um git push fora do @devops,
  estás a ver este modelo mental a funcionar — não é fricção, é a fundação que te deixa escalar.
