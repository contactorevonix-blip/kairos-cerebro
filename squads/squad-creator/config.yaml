# ═══════════════════════════════════════════════════════════════════════════════
# squad-creator — config.yaml (SINGLE SOURCE OF TRUTH, post-fusion)
# ═══════════════════════════════════════════════════════════════════════════════
# SQUAD-FUSION.6: base = C v4.0.0 (format wins) + mind-cloning sections re-grafted from
# the local B config.yaml and squad.yaml (consolidated per Pedro's amendment 2026-07-01:
# squad.yaml === config.yaml → one source of truth). Field-by-field mapping is recorded in
# docs/qa/squad-fusion/collision-resolution-log.md. squad.yaml is now a deprecated stub.
# ═══════════════════════════════════════════════════════════════════════════════

name: squad-creator
version: 4.0.0                 # C wins over local 1.0.0 (divergence logged)
tested: true
updated_at: "2026-07-01"       # bumped by the fusion
short-title: Squad Creator
description: >-
  Base meta-squad para criar squads de agentes via templates e validacao estrutural,
  FUNDIDO com mind-cloning local (Voice DNA + Thinking DNA de elite minds reais).
  Orchestrator: @squad-chief (triage, routing, criacao template-driven de squads).
  Base mode: 24 tasks, 3 workflows. Mind-cloning: @oalanicolas (DNA extraction) +
  @pedro-valerio (process/veto), 7 mind tasks, wf-clone-mind.yaml — LOCAL (nao pro-gated).
author: AIOX Team
entry_agent: squad-chief       # === squad.yaml.orchestrator (consolidated)
slashPrefix: squadCreator

# ─── Consolidated from squad.yaml (mind-cloning identity) ───────────────────────
domain: meta                   # from squad.yaml
purpose: "Criar, clonar, validar e orquestrar squads de agentes baseados em elite minds reais"  # from squad.yaml
philosophy: "Clone minds > create bots"  # from squad.yaml

settings:
  activation:
    show_ecosystem_report: true   # Display stats on activation
    show_greeting: true           # Display agent greeting
    show_quick_commands: true     # Display command shortcuts

  ecosystem_report:
    show_totals: true             # Total squads, agents, tasks
    show_top_squads: true         # Table of largest squads
    show_quality_refs: true       # Gold standard references
    show_gaps: false              # Identified domain gaps
    top_squads_limit: 5           # How many squads to display

# ─── Mind-cloning settings (from local B config.yaml + squad.yaml.quality) ───────
# Preserved as an additional section (SQUAD-FUSION.6 AC2). These drive @oalanicolas /
# @pedro-valerio and the mind-research-loop.
mind_cloning:
  default_mode: quality         # yolo | quality | hybrid (local B settings.default_mode)
  min_fidelity: 85              # minimo para aprovar clone (== squad.yaml.quality.fidelity_minimum)
  min_quality_score: 7.0        # minimo para aprovar squad (== squad.yaml.quality.minimum_score)
  smoke_tests_required: 3       # smoke tests obrigatorios por agent (== squad.yaml.quality.smoke_tests)
  research_iterations: 3        # iteracoes minimas no mind-research-loop
  devil_advocate: true          # activar devil's advocate nas iteracoes

# ─── Agents (consolidated from squad.yaml.agents) ───────────────────────────────
# DECISION (SQUAD-FUSION.6 Task 3.3 / @po should-fix): `.claude/agents/` remains the
# official source of truth for these agents (consistent with the "<!-- local copy -->"
# comments in the squad-local files). The squad-local canonical copies (converted in
# SQUAD-FUSION.4/.5) are recorded as `local_copy` for IDE-FILE-RESOLUTION, without
# silently repointing `file`.
agents:
  - id: squad-chief
    tier: orchestrator
    file: ../../.claude/agents/squad-chief.md          # official source of truth
    local_copy: squads/squad-creator/agents/squad-chief.md  # canonical squad-local copy (.1/.5)
    role: "Orquestra criacao completa de squads"
  - id: oalanicolas
    tier: 1
    file: ../../.claude/agents/oalanicolas.md
    local_copy: squads/squad-creator/agents/oalanicolas.md   # canonical squad-local copy (.4)
    role: "Mind cloning — Voice DNA + Thinking DNA"
  - id: pedro-valerio
    tier: 1
    file: ../../.claude/agents/pedro-valerio.md
    local_copy: squads/squad-creator/agents/pedro-valerio.md # canonical squad-local copy (.4)
    role: "Process absolutist — workflow validation + veto conditions"

# ─── Workflows (consolidated from squad.yaml.workflows) ─────────────────────────
# NOTE: mind-research-loop.md is a task (tasks/), listed by squad.yaml under workflows;
# kept here for fidelity to the local declaration but it resolves under tasks/.
workflows:
  - wf-create-squad.yaml
  - wf-clone-mind.yaml
  - mind-research-loop.md   # resolves to tasks/mind-research-loop.md

workspace_integration:
  level: read_write
  rationale: >-
    O squad-creator consome contexto do workspace para scaffolding e validacao,
    e pode publicar artefatos em namespaces de templates/dominios durante setup.
  read_paths:
    - workspace/
    - workspace/_templates/
    - workspace/domains/
  write_paths:
    - workspace/_templates/
    - workspace/domains/
  template_namespace: squad-governance

metadata:
  version: "4.0.0"
  type: "base"
  pro_detection: true
  pro_path: "squads/squad-creator-pro/config.yaml"
  score: 9.0
  # base_stats supersede squad.yaml.structure (canonical_folders/root_files/total_components),
  # which were stale hardcoded counters (27 components) removed in the consolidation (AC3).
  base_stats:
    agents: 3          # updated: squad-chief + oalanicolas + pedro-valerio (was 1 in C base; fusion adds mind agents)
    tasks: 31          # 24 C + 7 mind-cloning (post-fusion, from SQUAD-FUSION.2)
    workflows: 5       # 3 C + wf-clone-mind + wf-synkra-repo-analysis
    configs: 5         # 3 local + 2 from C (SQUAD-FUSION.1)
    checklists: 11     # 9 C + mind-validation + squad-qa-checklist
    data_files: 12     # 10 C + knowledge-base + squad-registry
