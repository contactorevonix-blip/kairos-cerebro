# AIOX IDE Sync Configuration
# Automatically sync agents, tasks, checklists, and workflows to IDE configurations
#
# Generated by: merge template + squad config KAIROS_CEREBRO
# Date: 2026-05-31
# [SOURCE: .aiox-core/infrastructure/templates/aiox-sync.yaml.template]

version: "1.0.0"

# ═══════════════════════════════════════════════════════════════════════════════
# ACTIVE IDEs
# ═══════════════════════════════════════════════════════════════════════════════
active_ides:
  - claude    # Claude Code (.claude/commands/)
  # - cursor    # Cursor IDE (.cursor/rules/) — desactivado (não usado)
  # - gemini    # Google Gemini (.gemini/) — desactivado

# ═══════════════════════════════════════════════════════════════════════════════
# SQUAD ALIASES
# ═══════════════════════════════════════════════════════════════════════════════
squad_aliases:
  claude-code-mastery: Claude-Code-Mastery
  deep-research: Deep-Research
  squad-creator: Squad-Creator
  aiox-cerebro: AIOX-Cerebro
  system-factory: System-Factory

# ═══════════════════════════════════════════════════════════════════════════════
# ACTIVE SQUADS
# ═══════════════════════════════════════════════════════════════════════════════
active_squads:
  - claude-code-mastery
  - deep-research
  - squad-creator
  - aiox-cerebro
  - system-factory

# ═══════════════════════════════════════════════════════════════════════════════
# SYNC MAPPINGS
# ═══════════════════════════════════════════════════════════════════════════════
sync_mappings:

  squad_agents:
    source: "squads/*/agents/"
    destinations:
      claude:
        - path: ".claude/commands/{squad_alias}/agents/"
          format: "md"
          wrapper: "none"

  squad_tasks:
    source: "squads/*/tasks/"
    destinations:
      claude:
        - path: ".claude/commands/{squad_alias}/tasks/"
          format: "md"
          wrapper: "none"

  squad_workflows:
    source: "squads/*/workflows/"
    destinations:
      claude:
        - path: ".claude/commands/{squad_alias}/workflows/"
          format: "md"
          wrapper: "none"

  squad_checklists:
    source: "squads/*/checklists/"
    destinations:
      claude:
        - path: ".claude/commands/{squad_alias}/checklists/"
          format: "md"
          wrapper: "none"

  squad_data:
    source: "squads/*/data/"
    destinations:
      claude:
        - path: ".claude/commands/{squad_alias}/data/"
          format: "md"
          wrapper: "none"

# ═══════════════════════════════════════════════════════════════════════════════
# WRAPPERS
# ═══════════════════════════════════════════════════════════════════════════════
wrappers:
  cursor-rule:
    prepend: |
      ---
      description: {description}
      globs: []
      alwaysApply: false
      ---

      {content}
    extract_description: true

  slash-command:
    prepend: |
      # /{filename} Command

      When this command is used, adopt the following agent persona:

      {content}

  none:
    prepend: ""

# ═══════════════════════════════════════════════════════════════════════════════
# FILE FILTERS
# ═══════════════════════════════════════════════════════════════════════════════
file_filters:
  include:
    - "*.md"
    - "*.yaml"
    - "*.yml"
  exclude:
    - "README.md"
    - "*.test.md"
    - "*.draft.md"
    - ".DS_Store"
    - "*.bak"

# ═══════════════════════════════════════════════════════════════════════════════
# BEHAVIOR
# ═══════════════════════════════════════════════════════════════════════════════
behavior:
  auto_sync_on_commit: false
  create_missing_dirs: true
  backup_before_sync: false
  validate_after_sync: true
  log_sync_operations: true
  fail_on_error: false

# ═══════════════════════════════════════════════════════════════════════════════
# EXCLUSIONS
# ═══════════════════════════════════════════════════════════════════════════════
exclusions:
  - "*.bak"
  - "*.tmp"
  - "*-test.md"
  - "INTERNAL-*.md"
  - ".state.yaml"
  - "archive/*"

# ═══════════════════════════════════════════════════════════════════════════════
# VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════
validation:
  check_yaml_valid: true
  check_no_hardcoded_paths: true
  check_dependencies_exist: true

# ═══════════════════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════════════════
logging:
  enabled: true
  log_file: ".aiox-sync.log"
  log_level: "info"
  max_log_size_mb: 10
  rotate_logs: true
