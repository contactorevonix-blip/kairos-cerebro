<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOX Reference Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        h1 { color: #818cf8; font-size: 2em; margin-bottom: 10px; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.5);
            color: #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
        }
        input::placeholder { color: #94a3b8; }
        button {
            padding: 12px 24px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #4f46e5; }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-tag {
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
        }
        .filter-tag:hover { background: rgba(99, 102, 241, 0.3); }
        .filter-tag.active { background: #6366f1; border-color: #6366f1; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            padding: 20px;
            display: none;
        }
        .card.active { display: block; }
        .card-title { color: #10b981; font-weight: bold; margin-bottom: 12px; font-size: 1.1em; }
        .card-subtitle { color: #818cf8; font-size: 0.9em; margin-bottom: 8px; }
        .card-content { font-size: 0.9em; line-height: 1.6; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(16, 185, 129, 0.2);
            color: #86efac;
            border-radius: 4px;
            font-size: 0.8em;
            margin: 4px 4px 4px 0;
        }
        .badge.exclusive { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        footer { text-align: center; padding: 20px; opacity: 0.7; font-size: 0.85em; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 AIOX Reference Dashboard</h1>
            <p>Lookup agents, workflows, exclusive operations, constitution articles</p>
        </header>

        <div class="search-box">
            <input type="text" id="search" placeholder="Search agents, workflows, or operations..." onkeyup="filterCards()">
            <button onclick="clearFilters()">Clear</button>
        </div>

        <div class="filters">
            <div class="filter-tag" onclick="toggleFilter(this, 'agent')">Agents (13)</div>
            <div class="filter-tag" onclick="toggleFilter(this, 'workflow')">Workflows (4)</div>
            <div class="filter-tag" onclick="toggleFilter(this, 'constitution')">Constitution (6)</div>
            <div class="filter-tag" onclick="toggleFilter(this, 'exclusive')">Exclusive Ops</div>
        </div>

        <div class="grid" id="cardsContainer"></div>

        <footer>
            <p>⚡ AIOX Reference Dashboard — Instant lookup for framework mastery</p>
        </footer>
    </div>

    <script>
        const data = {
            agents: [
                { id: 1, name: '@dev (Dex)', type: 'agent', role: 'Implementation', exclusive: 'git add, git commit', desc: 'Writes code, commits locally, self-critiques' },
                { id: 2, name: '@qa (Quinn)', type: 'agent', role: 'QA Gate', exclusive: '7-point review', desc: 'Tests code, runs quality checks, blocks failures' },
                { id: 3, name: '@architect (Aria)', type: 'agent', role: 'Design Authority', exclusive: 'Architecture decisions', desc: 'System design, tech selection, high-level planning' },
                { id: 4, name: '@pm (Morgan)', type: 'agent', role: 'Epic Orchestration', exclusive: '*execute-epic', desc: 'Epic creation, requirements gathering, spec writing' },
                { id: 5, name: '@po (Pax)', type: 'agent', role: 'Story Validation', exclusive: '10-point gate', desc: 'Validates stories, checks acceptance criteria' },
                { id: 6, name: '@sm (River)', type: 'agent', role: 'Story Creation', exclusive: '*create-story', desc: 'Creates stories from epic context and PRD' },
                { id: 7, name: '@devops (Gage)', type: 'agent', exclusive: 'true', role: 'CI/CD + Push', exclusive: 'git push (EXCLUSIVE)', desc: '✓ ONLY agent allowed to push to main' },
                { id: 8, name: '@analyst (Alex)', type: 'agent', role: 'Research', exclusive: '*research', desc: 'Deep research, competitive analysis, validation' },
                { id: 9, name: '@data-engineer (Dara)', type: 'agent', role: 'Database', exclusive: 'Schema design', desc: 'DDL, migrations, RLS policies, query optimization' },
                { id: 10, name: '@ux-design-expert (Uma)', type: 'agent', role: 'UX/UI Design', exclusive: 'Design decisions', desc: 'Frontend architecture, component design, accessibility' },
                { id: 11, name: '@aiox-master (Orion)', type: 'agent', role: 'Governance', exclusive: 'Constitution enforcement', desc: 'Framework governance, escalation handling' },
                { id: 12, name: '@squad-creator (Craft)', type: 'agent', role: 'Squad Design', exclusive: 'Squad creation', desc: 'Builds and manages agent squads' },
                { id: 13, name: '@business-chief (Chief)', type: 'agent', role: 'Strategy', exclusive: 'Epic decisions', desc: 'Business direction, growth strategy' }
            ],
            workflows: [
                { id: 1, name: 'Story Development Cycle (SDC)', type: 'workflow', phases: 5, desc: '5-phase workflow: Create → Validate → Implement → QA → Push' },
                { id: 2, name: 'Spec Pipeline', type: 'workflow', phases: 6, desc: '6-phase requirement transformation: Gather → Assess → Research → Write → Critique → Plan' },
                { id: 3, name: 'QA Loop', type: 'workflow', phases: 'Iterative', desc: 'Review-fix cycle: @qa reviews → verdict → @dev fixes (max 5 iterations)' },
                { id: 4, name: 'Brownfield Discovery', type: 'workflow', phases: 10, desc: '10-phase technical debt assessment for legacy codebases' }
            ],
            constitution: [
                { id: 1, article: 'I', principle: 'CLI First', severity: 'NON-NEGOTIABLE', desc: 'Funcionalidade deve trabalhar 100% via CLI antes de qualquer UI' },
                { id: 2, article: 'II', principle: 'Agent Authority', severity: 'NON-NEGOTIABLE', desc: 'Cada agente tem autoridade clara; não misturar escopos' },
                { id: 3, article: 'III', principle: 'Story-Driven', severity: 'MUST', desc: 'Todo código flui de story com acceptance criteria' },
                { id: 4, article: 'IV', principle: 'No Invention', severity: 'MUST', desc: 'Zero features inventadas; apenas requisitos especificados' },
                { id: 5, article: 'V', principle: 'Quality First', severity: 'MUST', desc: 'Gates obrigatórios: lint, typecheck, tests, build, CodeRabbit' },
                { id: 6, article: 'VI', principle: 'Absolute Imports', severity: 'SHOULD', desc: 'Sempre imports absolutos com alias @/; nunca relativos' }
            ]
        };

        let activeFilters = new Set();

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            [...data.agents, ...data.workflows, ...data.constitution].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card active';
                card.setAttribute('data-type', item.type);
                card.setAttribute('data-search', JSON.stringify(item).toLowerCase());

                if (item.type === 'agent') {
                    card.innerHTML = `
                        <div class="card-title">${item.name}</div>
                        <div class="card-subtitle">🔹 ${item.role}</div>
                        <div class="card-content">${item.desc}</div>
                        ${item.exclusive ? `<div style="margin-top:12px;"><span class="badge exclusive">🔴 ${item.exclusive}</span></div>` : ''}
                    `;
                } else if (item.type === 'workflow') {
                    card.innerHTML = `
                        <div class="card-title">${item.name}</div>
                        <div class="card-subtitle">📊 ${item.phases} phases</div>
                        <div class="card-content">${item.desc}</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="card-title">Article ${item.article}: ${item.principle}</div>
                        <div class="card-subtitle">⚠️ ${item.severity}</div>
                        <div class="card-content">${item.desc}</div>
                    `;
                }

                container.appendChild(card);
            });
        }

        function filterCards() {
            const search = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                const type = card.getAttribute('data-type');
                const matchesSearch = text.includes(search);
                const matchesFilter = activeFilters.size === 0 || activeFilters.has(type);

                card.style.display = matchesSearch && matchesFilter ? 'block' : 'none';
            });
        }

        function toggleFilter(el, filterType) {
            el.classList.toggle('active');
            if (activeFilters.has(filterType)) {
                activeFilters.delete(filterType);
            } else {
                activeFilters.add(filterType);
            }
            filterCards();
        }

        function clearFilters() {
            document.getElementById('search').value = '';
            activeFilters.clear();
            document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
            filterCards();
        }

        renderCards();
    </script>
</body>
</html>
