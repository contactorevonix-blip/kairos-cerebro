top_issues:
  - id: 'TEST-001'
    severity: high
    finding: 'npm test exits 1: 9 cancelled tests in tests/hooks/auto-contextualization-hook.test.js. The runContextPhasesGuarded timeout timer is unref()d (agent-activation-tracker.cjs:204), so when the HANGING_ENGINE test awaits the 2s budget the event loop has no live handle and node --test reports "Promise resolution is still pending but the event loop has already resolved", cancelling that test and cascading to 8 more. The stories report this same file as "75/75" / "8/8 PASS".'
    suggested_action: 'Return @dev to fix: in the test, keep the loop alive during the timeout wait (e.g. a ref()d guard timer in the test, or fake timers); OR make the guard timer ref()d while awaiting and unref only on the production hook path. Re-run npm test to exit 0 before declaring the epic Done.'
  - id: 'REQ-001'
    severity: medium
    finding: '5.3.1 AC1 claims executability via `aiox run-context-engine`; no such CLI exists in bin/ or .aiox-core/. Story is marked Done with an unmet AC.'
    suggested_action: 'Either add the CLI binding (route via @dev) or have @po amend AC1 to reflect the class-only delivery; record the decision in the Change Log.'
  - id: 'REL-001'
    severity: medium
    finding: '5.3.3 registry module (context-registry.js) is not imported by engine.js. Engine uses its own inline loadRegistry/saveRegistry against registryPath=.synapse/context-registry.yaml but JSON.parse()s it (and saveRegistry writes JSON into a .yaml-named file). Phase 5/10 "real engine integration" (AC4/AC8) is therefore not actually wired.'
    suggested_action: 'Wire engine.js to require .synapse/context-registry.js (or reconcile path/format so engine + module use one store). Track as a follow-up story; current engine self-test masks the gap.'
  - id: 'MNT-001'
    severity: low
    finding: '5.3.1 Tasks 7-11 (Phases 6-10 as phases/*.js modules) unchecked and Dev Record lists them as "Remaining Work", yet phases 6-10 exist inline in engine.js. Documentation/implementation drift on a Done story.'
    suggested_action: 'Reconcile task checkboxes and Dev Record with the inline implementation, or split out modules to match the stated File List.'
  - id: 'PROC-001'
    severity: low
    finding: 'Status-field drift: 5.3.2 header lagged its own Change Log (InReview vs Done); 5.3.3 had a duplicate trailing Status line; 5.3.4 had no Change Log and no recorded gate verdict; STATE.md header stale (branch main / push pending after push). Same lifecycle-hygiene pattern flagged in 5.2 gate (REL-001).'
    suggested_action: 'Enforce qa-gate.md "Post-Gate Status Update (MANDATORY)" — update the header Status field + append a Change Log gate entry in the same step the verdict is decided.'

