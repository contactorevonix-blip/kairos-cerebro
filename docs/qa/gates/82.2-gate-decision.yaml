revision_note: >-
  REVISED CONCERNS → PASS (2026-06-27). The original CONCERNS rested entirely on
  AC1/AC6 being non-demonstrable because L3 returned null. The first gate attributed
  this to parseManifest() "returning 0 domains" (suspected manifest-parser / FR-3
  defect). That root-cause attribution was WRONG. The parser is correct — it returns
  19 domains when called with the manifest FILE path. The actual defect (SYN-001) was
  a 2-line bug in the L4 hook .claude/hooks/synapse-engine.cjs (lines 64-65): it
  passed parseManifest(runtime.cwd) — a DIRECTORY — and then unwrapped a non-existent
  `.manifest` property, so the engine received manifest:undefined and L3-L6 had no
  domains to resolve. Fixed and committed as 3bbf446 (attributed to Story 82.1's FR-3
  hook wiring, where the regression originated). 82.2's own L1 code (engine.js,
  formatter.js) was never the problem and is unchanged since the first review.

