top_issues:
  - id: 'SYN-001'
    severity: high
    category: requirements
    status: RESOLVED
    resolved_by: 'commit 3bbf446 (Story 82.1 — FR-3 hook wiring)'
    finding: >-
      L3 returned null end-to-end. ORIGINAL (first-gate) attribution — "parseManifest
      returns 0 domains, a manifest-parser / FR-3 defect" — was incorrect. The parser
      is correct (returns 19 domains with the right path). The real defect was the L4
      hook .claude/hooks/synapse-engine.cjs (lines 64-65) calling parseManifest with
      the cwd directory instead of the .synapse/manifest file path, then unwrapping a
      non-existent `.manifest` field → engine got manifest:undefined → L3-L6 had no
      domains.
    resolution: >-
      2-line fix in the L4 hook: parseManifest(path.join(runtime.cwd,'.synapse',
      'manifest')) and manifest = manifestResult. Verified in working tree (lines
      64-65) and in HEAD (commit 3bbf446). With the fix, L3 injects 9 rules E2E and
      AC1/AC6 pass. 82.2's L1 code required no change.
  - id: 'DOC-001'
    severity: medium
    category: docs
    status: RESOLVED
    finding: >-
      Story previously marked AC1/AC6 fully met when validated only at prototype level.
    resolution: >-
      Dev Agent Record now carries the SYN-001 RESOLVED section with the true root
      cause and E2E numbers; AC1/AC6 claims now match demonstrated behaviour.
  - id: 'TEST-001'
    severity: low
    category: tests
    status: OPEN
    finding: >-
      merge-precedence.test.js exercises AC1/AC2 by injecting a HAND-BUILT manifest
      straight into engine.process — it never drives the L4 hook's manifest-LOADING
      path, which is exactly where SYN-001 lived. That is why 11/11 stayed green while
      the real hook was broken. Acceptable for 82.2 scope (integration is 82.6), but it
      is the durable guard that would have caught SYN-001 in CI.
    suggested_action: >-
      82.6 MUST add an end-to-end assertion that drives the hook's manifest-loading
      path (or a fixture-backed parseManifest → engine.process) and asserts L3 injects
      > 0 rules when active_workflow is set. This is the only residual follow-up.

out_of_scope_verified:
