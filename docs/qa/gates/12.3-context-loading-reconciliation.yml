      boundary hit, forceRefresh, clearCache, corrupt-cache graceful. PASS.
  - ac: 5
    requirement: 'Agent load time < 500ms (NFR-1.1)'
    verdict: PASS
    evidence: >-
      Live activation logged 179ms total (reconcile 6ms), well under 500ms.
      Reconciler runs in Tier-1 budget in parallel with AgentConfig.
  - ac: 6
    requirement: 'Cache hit rate > 80% (NFR-1.3)'
    verdict: PASS
    evidence: >-
      Metrics track cacheHits/cacheMisses + cacheHitRate. Test "cache hit rate
      exceeds 80% after warm-up (10 loads)" = 90% (1 miss + 9 hits). PASS.
  - ac: 7
    requirement: 'Context expansion 102 ln shim → 937+ ln context (FR-4.2)'
    verdict: CONCERNS
    evidence: >-
      See REQ-001. Reconciler exposes + counts lineCount correctly, but the
      resolved winning-surface content for a shim-backed agent is 102 ln, not
      937+. FR-4.2 requirements.json acceptance ("Context size > 937 lines")
      and INT-1 describe the AGGREGATE loaded context — not the winning surface
      raw size — so the requirement is genuinely unmet at the integration level.
      Not a reconciler defect; aggregate expansion is out of this module's scope.
