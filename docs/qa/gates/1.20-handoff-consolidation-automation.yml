top_issues:
  - id: 'TEST-001'
    severity: high
    finding: 'No test file exists for the consolidation logic (glob tests/**/*consolidat* and tests/**/*handoff* return nothing; File List declares none). Sibling stories 1.17 and 1.18 each shipped test suites (12 and 9 tests). The Change Log entry "consolidation script tested" is not backed by any test artifact. AC5 "No handoff data lost (archive preserved)" is unverified — the archive path uses fs.renameSync, so a grouping/threshold bug could move handoffs without a RUN-LOG entry.'
    suggested_action: 'Add tests against a temp fixture dir covering: (a) threshold gate (<5 skip, >=5 consolidate), (b) latest handoff stays individual, (c) archived files land in _archive/{pipeline}/ AND appear in RUN-LOG, (d) malformed JSON is skipped without throwing, (e) groupByPipeline maps story_id -> phase bucket correctly.'
  - id: 'MNT-001'
    severity: low
    finding: 'groupByPipeline buckets any handoff lacking story_id and not matching the 2.0-SYN filename branch into "unknown", which can mix unrelated pipelines into one RUN-LOG — contradicting the rule anti-pattern "Mix multiple pipelines in one RUN-LOG".'
    suggested_action: 'Harden pipeline identification (read pipeline_id field first, fall back to filename slug) before consolidating "unknown" buckets.'
