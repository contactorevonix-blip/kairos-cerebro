# ===========================================================================
# RISK MITIGATIONS (R1/R2 dominant, per PRD §6)
# ===========================================================================
risk_mitigations:
  R1:
    risk: "L1 Core boundary blocks engine edits (governance latency)."
    severity: "High likelihood / High impact — DOMINANT."
    mitigation:
      - "ONE batched *propose-modification filed in 82.1 declaring the FULL L1 surface
         (4 files), approved once — eliminates per-story approval round-trips."
      - "Minimise L1 surface: FR-1/2/3/8 done in L4 (calling L1 APIs, not editing L1)."
      - "@architect authors proposal; @aiox-master approves+authorises the write
         (Art. II — architect does NOT self-approve L1 writes)."
    residual: "Low — surface is small, well-bounded, and front-loaded."
  R2:
    risk: "Re-enabling L3-L7 reintroduces NOG-17 latency that caused the disable."
    severity: "Medium likelihood / High impact — DOMINANT."
    mitigation:
      - "Lazy per-layer triggers (FR-5): common case stays L0+L1+L2 (+L7 only on
         *command). Never the NOG-17 '17 files every prompt'."
      - "Keep PIPELINE_TIMEOUT_MS=100 hard cap (engine.js:184); remaining layers
         skipped on overrun (engine.js:308-317)."
      - "82.6 AC5 perf test asserts median <100ms with all triggers firing — a
         BLOCKING gate, not advisory."
    residual: "Low-Medium — lazy triggers structurally prevent regression."
  R7:
    risk: "Two sources of truth (sessions file vs hook-metrics.json) drift."
    mitigation:
      - "Resolved BY DESIGN: sessions file = single source of truth (FR-1);
         hook-metrics.json demoted to observability-only. No sync hook (rejected
         Option 2) — there is nothing to sync because there is one source."
    residual: "Eliminated at root."

# ===========================================================================
# 82.1 ENTRY POINT — test-first acceptance criterion that validates the G1 fix
# ===========================================================================
entry_point_82_1:
  test_first_ac: >
    G1-CLOSURE (write the FAILING test before the fix):
    Given a UserPromptSubmit event { prompt: "@pm draft the epic", session_id: S, cwd },
    when the SYNAPSE hook chain runs (synapse-engine.cjs activation bridge),
    then loadSession(S, .synapse/sessions) returns a session with
    active_agent.id === "pm"  (i.e. the agent id is present in the FILE THE ENGINE
    READS — hook-runtime.js:56-60 — not only in hook-metrics.json),
    AND SynapseEngine.process(prompt, thatSession, { manifest }) yields a result whose
    L2 layer metric is status:"ok" with rules.length > 0 sourced from .synapse/agent-pm.
  why_this_proves_g1: >
    The disconnect is precisely "writer (hook → hook-metrics.json) and reader
    (engine ← sessions file) target different files". This AC asserts both ends now
    agree on the sessions file AND that agreement produces non-zero L2 rules — the
    exact symptom (L2 functionally dead) flips to alive. It is executable via
    `node --test` with no UI, satisfying CON-4 (CLI-first).
  cli_verification: |
    node --test tests/hooks/synapse-activation.test.js
    node -e "const {runDiagnostics}=require('./.aiox-core/core/synapse/diagnostics/synapse-diagnostics');console.log(runDiagnostics(process.cwd()))"
    # Expect: L2 status active, rules > 0; 0 FAIL items.
  definition_of_done_82_1:
    - "L1 amendment plan filed (.aiox/proposals/EPIC-82-L1-amendment.md) + @aiox-master approved."
    - "PRD AC1-AC6 for 82.1 pass."
    - "G1-CLOSURE test green; no regression for the no-agent case (AC5)."
    - "synapse-diagnostics: L2 active, 0 FAIL (AC6)."

