# ════════════════════════════════════════════════════
# EPIC-PM-001 — Process Maps Foundation (Fase A)
# Prioridade: 1 (primeiro a implementar — sem dependências)
# Desbloqueia: EPIC-PM-006
# ════════════════════════════════════════════════════
epics:
  - id: EPIC-PM-001
    name: "Process Maps Foundation"
    phase: A
    priority: 1
    spec_features: [FEAT-01, FEAT-02, FEAT-03]
    depends_on: []
    stories:

      - id: PM-1.1
        name: "Script Node.js base — gerador HTML de processos"
        agent: "@dev"
        spec: FEAT-01
        description: "Criar scripts/generate-process-map.js — função core que recebe {nome, fases[], qualityGates[]} e gera HTML auto-contido em docs/process-maps/{nome}.html"
        acceptance_criteria:
          - "Dado um objecto de processo com 4 fases e 2 quality gates, quando o script é executado, então gera .html que abre no browser sem erros"
          - "HTML é auto-contido (sem dependências externas, sem servidor)"
          - "Fases têm código de cor distinto por tipo (mapper/architect/automation/qa)"
        estimate: M
        files:
          - "squads/process-mapper/scripts/generate-process-map.js"
          - "squads/process-mapper/scripts/html-templates.js"

      - id: PM-1.2
        name: "Template HTML — quality gates interactivos"
        agent: "@dev"
        spec: FEAT-01, FR-06
        description: "Expandir PM-1.1 com quality gates visuais: threshold ≥ X%, path YES (verde), path NO (vermelho com destino explícito), loops de retorno com seta identificada"
        depends_on: [PM-1.1]
        acceptance_criteria:
          - "Quality gate mostra threshold configurável (ex: ≥ 70%)"
          - "Path YES avança para próxima fase — visível"
          - "Path NO mostra destino exacto do loop (ex: 'Volta a Discovery')"
          - "Prova: aiox-squad-creation-pipeline.html como referência visual"
        estimate: M
        files:
          - "squads/process-mapper/scripts/html-templates.js"

      - id: PM-1.3
        name: "Mapa SDC — Story Development Cycle"
        agent: "@dev"
        spec: FEAT-01
        description: "Gerar docs/process-maps/sdc.html baseado em .claude/rules/workflow-execution.md (secção SDC) e .claude/rules/story-lifecycle.md"
        depends_on: [PM-1.2]
        acceptance_criteria:
          - "4 fases (Create/Validate/Implement/QA) com agentes correctos (@sm/@po/@dev/@qa)"
          - "Status transitions visíveis: Draft→Ready→InProgress→InReview→Done"
          - "QA gate com 4 veredictos (PASS/CONCERNS/FAIL/WAIVED)"
          - "Cada elemento rastreia para ficheiro fonte (map-validator confirma)"
        estimate: S
        source_files: [".claude/rules/workflow-execution.md", ".claude/rules/story-lifecycle.md"]

      - id: PM-1.4
        name: "Mapa QA Loop"
        agent: "@dev"
        spec: FEAT-01
        description: "Gerar docs/process-maps/qa-loop.html baseado em .claude/rules/workflow-execution.md (secção QA Loop)"
        depends_on: [PM-1.2]
        acceptance_criteria:
          - "Loop iterativo visível com contador max 5 iterações"
          - "3 veredictos (APPROVE/REJECT/BLOCKED) com caminhos distintos"
          - "4 escalation triggers documentados"
        estimate: S
        source_files: [".claude/rules/workflow-execution.md"]

      - id: PM-1.5
        name: "Mapa Spec Pipeline"
        agent: "@dev"
        spec: FEAT-01
        description: "Gerar docs/process-maps/spec-pipeline.html — 6 fases + classes de complexidade (SIMPLE/STANDARD/COMPLEX)"
        depends_on: [PM-1.2]
        acceptance_criteria:
          - "6 fases visíveis com agent assignments"
          - "Tabela de complexity classes com scores e fases aplicáveis"
          - "Critique verdicts com scores e next steps"
        estimate: S
        source_files: [".claude/rules/workflow-execution.md"]

      - id: PM-1.6
        name: "Mapa Brownfield Discovery"
        agent: "@dev"
        spec: FEAT-01
        description: "Gerar docs/process-maps/brownfield.html — 10 fases em 3 blocos (Data Collection / Draft & Validation / Finalization)"
        depends_on: [PM-1.2]
        acceptance_criteria:
          - "10 fases com agent assignments correctos"
          - "3 blocos visualmente distintos"
          - "QA Gate Fase 7 com loop APPROVED/NEEDS WORK"
        estimate: S
        source_files: [".claude/rules/workflow-execution.md"]

      - id: PM-1.7
        name: "Coverage Audit — process-auditor (Tier 0)"
        agent: "@dev"
        spec: FEAT-03
        description: "Implementar process-auditor: lê .aiox-core/development/tasks/, .claude/rules/, squads/*/squad.yaml → compara com docs/process-maps/ → gera coverage-report.md"
        depends_on: [PM-1.3, PM-1.4, PM-1.5, PM-1.6]
        acceptance_criteria:
          - "coverage-report.md gerado com % por domínio"
          - "Lista de gaps com prioridade"
          - "Score alvo ≥ 90% documentado"
        estimate: M
        files:
          - "squads/process-mapper/scripts/coverage-audit.js"
          - "docs/process-maps/coverage-report.md"

      - id: PM-1.8
        name: "SVG Figma-export — template directo + Mermaid opcional"
        agent: "@dev"
        spec: FEAT-02
        description: "Implementar geração SVG: (1) template Node.js directo como fallback garantido, (2) @mermaid-js/mermaid-cli se disponível. Output: docs/process-maps/figma/{nome}.svg"
        depends_on: [PM-1.2]
        acceptance_criteria:
          - "SVG gerado com viewBox='0 0 900 600' e elementos com id nomeados"
          - "SVG importa no Figma como vector group editável"
          - "Se mermaid CLI ausente, fallback SVG por template é usado automaticamente"
          - "Fallback produz SVG válido sem erros"
        estimate: M
        files:
          - "squads/process-mapper/scripts/generate-svg.js"
          - "docs/process-maps/figma/"

# ════════════════════════════════════════════════════
# EPIC-PM-002 — Agent Maps (Fase B)
# Prioridade: 2
