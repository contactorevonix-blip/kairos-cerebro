        acceptance_criteria:
          - "Tabela CSS grid com 1 coluna por agente"
          - "Handoffs cruzam lanes com seta diamante visível"
          - "Responsive — legível em ecrã largo"
        estimate: M
        files:
          - "squads/process-mapper/scripts/generate-swimlane.js"

      - id: PM-2.2
        name: "Mapa de autoridade dos 10 agentes"
        agent: "@dev"
        spec: FEAT-04
        description: "Gerar docs/process-maps/agents/authority-map.html baseado em .claude/rules/agent-authority.md — operações exclusivas, bloqueadas, e delegadas por agente"
        depends_on: [PM-2.1]
        acceptance_criteria:
          - "10 agentes com swim lanes"
          - "Operações EXCLUSIVE marcadas a vermelho"
          - "Operações BLOCKED marcadas a cinzento"
          - "Delegations com seta para agente destino"
        estimate: M
        source_files: [".claude/rules/agent-authority.md"]

      - id: PM-2.3
        name: "Diagrama de handoffs canónicos (Story Flow / Epic Flow / Git Push)"
        agent: "@dev"
        spec: FEAT-04
        description: "Gerar docs/process-maps/agents/handoff-flows.html — os 4 flows canónicos: Git Push Flow, Schema Design Flow, Story Flow, Epic Flow"
        depends_on: [PM-2.2]
        acceptance_criteria:
          - "4 flows visíveis como sequências lineares"
          - "Cada handoff tem agente de origem e destino"
          - "Git Push Flow mostra que ANY agent → @devops"
        estimate: S
        source_files: [".claude/rules/agent-authority.md"]

      - id: PM-2.4
        name: "Escalation tree — quando agente não consegue completar"
        agent: "@dev"
        spec: FEAT-04
        description: "Gerar docs/process-maps/agents/escalation-tree.html baseado nas 4 escalation rules de agent-authority.md"
        depends_on: [PM-2.2]
        acceptance_criteria:
          - "4 escalation triggers visíveis como árvore"
          - "Cada trigger aponta para @aiox-master"
          - "Constitutional violation path claramente destacado"
        estimate: S
        source_files: [".claude/rules/agent-authority.md"]

