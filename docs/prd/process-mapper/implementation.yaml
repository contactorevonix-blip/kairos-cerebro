# ════════════════════════════════════════════════════
# EPIC-PM-004 — File Maps + Automação (Fase D)
# Prioridade: 4
# Depende de: EPIC-PM-001 completo
# ════════════════════════════════════════════════════
  - id: EPIC-PM-004
    name: "File Maps + Actualização Automática"
    phase: D
    priority: 4
    spec_features: [FEAT-07]
    depends_on: [EPIC-PM-001]
    stories:

      - id: PM-4.1
        name: "process-registry.yaml — registry ficheiro→processo"
        agent: "@dev"
        spec: FEAT-07, QA-05_fix
