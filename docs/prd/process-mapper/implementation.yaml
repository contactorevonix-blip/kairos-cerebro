        name: "Process debt report"
        agent: "@dev"
        spec: FEAT-08
        description: "Gerar docs/process-maps/evolution/process-debt.md — lista de processos sem mapa, mapas desactualizados (ficheiro mais recente que o mapa), e processos órfãos"
