# ════════════════════════════════════════════════════
# EPIC-PM-006 — Gate Pré-Criação (Infra)
# Prioridade: 6
# BLOQUEADO até EPIC-PM-001 Done — ADR-PM-002
# ════════════════════════════════════════════════════
  - id: EPIC-PM-006
    name: "Gate Pré-Criação Automático"
    phase: Infra
    priority: 6
    spec_features: [FEAT-06]
    depends_on: [EPIC-PM-001]
    blocking_note: "NÃO iniciar antes de EPIC-PM-001 Done. Gate sem mapas = bloqueio total do AIOX."
    stories:

      - id: PM-6.1
        name: "process-map-gate.cjs — lógica de verificação"
        agent: "@dev"
        spec: FEAT-06, ADR-PM-001
        description: "Criar .claude/hooks/process-map-gate.cjs — verifica se existe mapa validado para o processo invocado. Se não existe → retorna mensagem bloqueante com instrução *map-process {processo}"
        acceptance_criteria:
          - "Dado comando *create-story sem mapa de SDC, quando gate é invocado, então retorna mensagem bloqueante com instrução *map-process sdc"
          - "Dado comando *create-story com mapa SDC score ≥ 90%, quando gate é invocado, então não bloqueia"
          - "Flag --skip-map-gate desactiva o gate para aquele comando"
        estimate: M
        files:
          - ".claude/hooks/process-map-gate.cjs"

      - id: PM-6.2
        name: "Matcher regex preciso — evitar falsos positivos"
        agent: "@dev"
        spec: FEAT-06, QA-04_concern
        description: "Gate activa apenas quando prompt começa com '@' ou '*' seguido de create/draft/create-epic/create-story/create-agent/create-squad. Não activa em perguntas naturais."
        depends_on: [PM-6.1]
        acceptance_criteria:
          - "Prompt '@sm *create-story' → gate activa"
          - "Prompt 'como funciona o create-story?' → gate NÃO activa"
          - "Prompt 'explica o *draft' → gate NÃO activa"
        estimate: S

      - id: PM-6.3
        name: "Integração em .claude/settings.json como 4º UserPromptSubmit hook"
        agent: "@dev"
        spec: FEAT-06, ADR-PM-001, RF-02
        description: "Adicionar process-map-gate.cjs como 4º hook em UserPromptSubmit em .claude/settings.json, síncrono (sem async)"
        depends_on: [PM-6.1, PM-6.2]
        acceptance_criteria:
          - ".claude/settings.json actualizado com o hook"
          - "Hook é síncrono — bloqueia antes de processar o prompt"
          - "3 hooks existentes continuam a funcionar (regressão zero)"
        estimate: S
        files:
          - ".claude/settings.json"

