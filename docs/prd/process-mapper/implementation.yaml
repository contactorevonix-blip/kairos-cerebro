# ════════════════════════════════════════════════════
# SEQUÊNCIA DE IMPLEMENTAÇÃO RECOMENDADA
# ════════════════════════════════════════════════════
implementation_sequence:
  wave_1:
    name: "Fundação paralela"
    epics: [EPIC-PM-007, EPIC-PM-001]
    note: "EPIC-PM-007 (squad structure) e EPIC-PM-001 (process maps) em paralelo. Independentes."
    duration_estimate: "2-3 semanas"

  wave_2:
    name: "Mapas especializados"
    epics: [EPIC-PM-002, EPIC-PM-003]
    depends_on: [EPIC-PM-001]
    note: "Agent Maps e Structure Maps após HTML base funcional"
    duration_estimate: "1-2 semanas"

  wave_3:
    name: "Automação e evolução"
    epics: [EPIC-PM-004, EPIC-PM-005]
    depends_on: [EPIC-PM-001]
    note: "File Maps (automação) e Evolution Tracker"
    duration_estimate: "1-2 semanas"

  wave_4:
    name: "Gate pré-criação"
    epics: [EPIC-PM-006]
    depends_on: [EPIC-PM-001]
    blocking_gate: "APENAS após EPIC-PM-001 Done e validado — ADR-PM-002"
    duration_estimate: "1 semana"

