      - id: PM-5.2
        name: "Timeline HTML visual do AIOX"
        agent: "@dev"
        spec: FEAT-08
        description: "Gerar docs/process-maps/evolution/timeline.html — linha do tempo com eventos de evolução do AIOX, clicáveis para detalhes"
