version: 1
name: ghost-commerce-alpha-omega
status: active

governance:
  compliance_mode: strict
  privacy_by_design: true
  prohibited:
    - deceptive_claims
    - dark_patterns
    - hidden_fees
    - unlawful_data_collection

handoff:
  format:
    - from
    - to
    - objective
    - input_artifacts
    - output_artifacts
    - kpi_target
    - deadline_utc
    - risk_level
  storage: ".aiox/handoffs"
  required: true

priorities:
  p0:
    - fraud_detection_accuracy
    - legal_compliance
    - false_positive_control
  p1:
    - localization_auto_detection
    - payment_localization
  p2:
    - seo_programmatic_growth
    - partner_enablement

cadence:
  strategy_cycle: "daily"
  build_cycle: "every-4-hours"
  growth_cycle: "weekly"
  executive_report: "daily-binary"

binary_report_template:
  decision: "SIM|NAO"
  rationale: "one-line"
  expected_impact: "MRR/Conversion/Risk"
