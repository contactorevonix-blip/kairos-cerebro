### 2. **IDS Ratio Clarity: Per-Phase Breakdown**
**Location:** Secção 8, "Estimation: IDS Impact"
**Issue:** Global ratio (65% REUSE / 30% ADAPT / 5% CREATE) is stated, but per-PHASE breakdown missing

**Current:**
```yaml
estimated_reuse_percentage: 65%
estimated_adapt_percentage: 30%
estimated_create_percentage: 5%
```

**Problem:**
- Phase 1 (Observability) likely has HIGHER CREATE (new metrics system)
- Phase 3 (Squad Creator) likely has HIGHER REUSE (existing agent patterns)
- Global average masks phase-specific risks

**Recommendation:**
Add per-phase breakdown:
```yaml
phase_1_observability:
  reuse: 40%  # (gate integration patterns from EPIC-7)
  adapt: 35%  # (metrics schema = new but SQL-based)
  create: 25% # (metrics CLI + Dashboard backend)

phase_2_ids_enhancement:
  reuse: 70%  # (existing G1-G5 gates as base)
  adapt: 20%  # (G6 CI/CD adaptation)
  create: 10% # (registry auto-heal logic)

phase_3_squad_creator:
  reuse: 80%  # (existing agent patterns)
  adapt: 15%  # (DNA extraction methodology)
  create: 5%  # (Squad template generation)

phase_4_auto_healing:
  reuse: 75%  # (CodeRabbit existing auto-fix)
  adapt: 20%  # (retry logic adaptation)
  create: 5%  # (blocker resolution engine)
```

**Impact:** MINOR — improves risk assessment per phase

