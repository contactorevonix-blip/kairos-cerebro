<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8"/>
  <title>KAIROS Shield</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{color-scheme:dark}
    body{
      width:340px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      background:#000005;color:#f1f2f4;
      -webkit-font-smoothing:antialiased;
    }
    .header{
      display:flex;align-items:center;gap:10px;
      padding:14px 16px;
      background:rgba(255,255,255,.03);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    .logo{
      width:28px;height:28px;border-radius:7px;flex-shrink:0;
      background:linear-gradient(145deg,#3ceabb,#2ad1a3);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;color:#000;font-weight:800;
      box-shadow:0 0 0 1px rgba(60,234,187,.3),0 2px 8px rgba(60,234,187,.15);
    }
    .header-info{flex:1;min-width:0}
    .header-title{font-size:13px;font-weight:700;letter-spacing:-.02em;color:#f1f2f4;line-height:1.3}
    .header-sub{font-size:10px;color:#545b66;letter-spacing:-.01em;line-height:1.3}
    .header-status{display:flex;align-items:center;gap:5px;font-size:10px;flex-shrink:0}
    .status-dot{width:6px;height:6px;border-radius:50%;background:#4a5568}
    .status-dot.online{background:#30d158;box-shadow:0 0 5px #30d158}
    .status-dot.offline{background:#ff3b30}
    #api-status{color:#545b66}

    .verdict-section{padding:14px 16px 0}
    .verdict-card{
      border-radius:12px;padding:14px;
      display:flex;align-items:center;gap:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.025);
    }
    .verdict-card.safe{background:rgba(48,209,88,.06);border-color:rgba(48,209,88,.2)}
    .verdict-card.review{background:rgba(255,149,0,.06);border-color:rgba(255,149,0,.2)}
    .verdict-card.block{background:rgba(255,59,48,.08);border-color:rgba(255,59,48,.25)}
    .verdict-icon{font-size:26px;flex-shrink:0;line-height:1}
    .verdict-label{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#545b66;line-height:1.3}
    .verdict-text{font-size:18px;font-weight:800;letter-spacing:-.03em;line-height:1.2;margin-top:2px;color:#8b929e}
    .verdict-text.safe{color:#30d158}
    .verdict-text.review{color:#ff9500}
    .verdict-text.block{color:#ff3b30}
    .verdict-score{font-size:10px;color:#8b929e;margin-top:3px;font-family:monospace}

    .domain-bar{
      margin:10px 16px 0;padding:7px 10px;
      background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05);
      border-radius:7px;display:flex;align-items:center;gap:6px;
    }
    .domain-text{font-size:10.5px;color:#545b66;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .actions{padding:10px 16px;display:flex;gap:7px}
    .btn{
      flex:1;padding:9px;border-radius:8px;border:none;
      font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:-.01em;
    }
    .btn-primary{background:#3ceabb;color:#000}
    .btn-primary:hover{background:#5af2ca}
    .btn-primary:disabled{opacity:.5;cursor:progress}
    .btn-ghost{background:rgba(255,255,255,.05);color:#8b929e;border:1px solid rgba(255,255,255,.07);flex:0;padding:9px 13px}
    .btn-ghost:hover{color:#f1f2f4;background:rgba(255,255,255,.08)}

    .settings-panel{display:none;padding:12px 16px;border-top:1px solid rgba(255,255,255,.05)}
    .settings-panel.open{display:block}
    .setting-label{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#4a5568;margin-bottom:4px;margin-top:10px}
    .setting-label:first-child{margin-top:0}
    .setting-input{
      width:100%;padding:7px 9px;border-radius:6px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
      color:#f1f2f4;font-family:monospace;font-size:11px;
    }
    .setting-input:focus{outline:none;border-color:rgba(60,234,187,.35)}
    .btn-save{width:100%;margin-top:10px;padding:8px;border-radius:7px;border:none;background:#3ceabb;color:#000;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
    .btn-save:hover{background:#5af2ca}

    .footer{
      padding:9px 16px;border-top:1px solid rgba(255,255,255,.05);
      display:flex;align-items:center;justify-content:space-between;
    }
    .footer-brand{font-size:10px;color:#4a5568}
    .footer-link{font-size:10px;color:#3ceabb;text-decoration:none}
    .footer-link:hover{text-decoration:underline}

    @keyframes spin{to{rotate:360deg}}
    .spin{display:inline-block;animation:spin .7s linear infinite}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">K</div>
    <div class="header-info">
      <div class="header-title">KAIROS Shield</div>
      <div class="header-sub">Anti-Fraud Protection</div>
    </div>
    <div class="header-status">
      <div class="status-dot" id="api-dot"></div>
      <span id="api-status">—</span>
    </div>
  </div>

  <div class="verdict-section">
    <div class="verdict-card" id="verdict-card">
      <div class="verdict-icon" id="verdict-icon">🔍</div>
      <div>
        <div class="verdict-label">Estado de segurança</div>
        <div class="verdict-text" id="verdict-text">A verificar…</div>
        <div class="verdict-score" id="verdict-score"></div>
      </div>
    </div>
  </div>

  <div class="domain-bar">
    <span style="color:#3ceabb;font-size:11px;flex-shrink:0">🌐</span>
    <span class="domain-text" id="current-domain">—</span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="scan-btn">Analisar página</button>
    <button class="btn btn-ghost" id="settings-btn" title="Definições">⚙</button>
  </div>

  <div class="settings-panel" id="settings-panel">
    <div class="setting-label">API URL</div>
    <input class="setting-input" id="apiBaseUrl" placeholder="https://kairos-cerebro-production.up.railway.app"/>
    <div class="setting-label">API Key (opcional — gerada automaticamente)</div>
    <input class="setting-input" id="apiKey" type="password" placeholder="ksk_…"/>
    <button class="btn-save" id="save-btn">Guardar</button>
  </div>

  <div class="footer">
    <span class="footer-brand">KAIROS v0.2.0</span>
    <a href="https://kairos-cerebro-production.up.railway.app/dashboard" class="footer-link" target="_blank">Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
