<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8"/>
  <title>KAIROS — Verificar página</title>
  <style>
    :root { color-scheme: dark; }
    /* Product UI alignment: system font, modest tracking (avoids “stretched” all-caps), sane line-height on big numbers */
    body { width: 320px; margin: 0; font: 14px/1.5 system-ui, "Segoe UI", sans-serif; background: #050c18; color: #e6f1ff; }
    header { padding: 12px 16px; background: #071220; border-bottom: 1px solid #0d2040; }
    header h1 { margin: 0; font-size: 14px; font-weight: 700; letter-spacing: 0.04em; line-height: 1.35; }
    main { padding: 16px; }
    button { width: 100%; padding: 10px 12px; border: 0; border-radius: 6px; background: #00b8d4; color: #020408; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: progress; }
    .verdict { margin-top: 12px; padding: 12px; border-radius: 6px; }
    .verdict.allow { background: #0d2a1a; border: 1px solid #14532d; }
    .verdict.review { background: #2a230d; border: 1px solid #533a14; }
    .verdict.block { background: #2a0d0d; border: 1px solid #531414; }
    .label { text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; opacity: 0.6; line-height: 1.35; }
    .score { font-size: 28px; font-weight: 800; line-height: 1.15; }
    a { color: #4df0ff; }
    .settings { margin-top: 16px; padding-top: 12px; border-top: 1px solid #0d2040; font-size: 12px; }
    .settings input { width: 100%; padding: 6px 8px; margin: 4px 0 8px; border-radius: 4px; border: 1px solid #0d2040; background: #071220; color: #e6f1ff; }
  </style>
</head>
<body>
  <header><h1>KAIROS — Anti-Fraud Shield</h1></header>
  <main>
    <button id="check">Verificar esta página</button>
    <div id="output"></div>
    <div class="settings">
      <div class="label">API base URL</div>
      <input id="apiBaseUrl" placeholder="https://api.kairos.example" />
      <div class="label">API key</div>
      <input id="apiKey" type="password" placeholder="ksk_..." />
      <button id="save" style="background: #102548; color: #4df0ff;">Guardar</button>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
