# KAIROS Check Engine — Railway Configuration
# Serve check-engine na porta definida pela env var $PORT (Railway injeta automaticamente)

[build]
# Node.js build standard
builder = "nixpacks"

[deploy]
# Comando de start: node packages/check-engine/src/index.js
# A porta é injectada por Railway em $PORT (default: 8787 em Kairos, mas Railway pode mudar)
startCommand = "node packages/check-engine/src/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[env]
# Env vars que Railway deve definir para check-engine

# Storage path para JSON ledger (Railway volume)
# Mapeado em Railway como um volume montado em /var/run/kairos-storage
CHECKS_STORAGE_PATH = "/var/run/kairos-storage/checks.jsonl"

# Replicação de dados (opcional, ativar em Fase 2.5 com Redis)
KAIROS_RG_REPLICATE_REDIS = "0"

# Logs (Railway captura tudo que vai para stdout)
NODE_ENV = "production"

[volumes]
# Railway: montar volume em /var/run/kairos-storage para persistência
# Configurado no dashboard de Railway → kairos-api service → Volumes
# storageId = "check-engine-storage"
# mountPath = "/var/run/kairos-storage"
